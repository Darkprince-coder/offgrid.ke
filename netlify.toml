[build]
  command   = "npm run build"
  publish   = "dist"

# React Router — serve index.html for all routes so
# direct URL visits and page refreshes work correctly
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Identity endpoint — required for Netlify Identity + Git Gateway
[build.environment]
  NODE_VERSION = "18"
